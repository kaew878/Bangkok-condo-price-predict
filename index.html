<!DOCTYPE html>
<html lang='th'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Fast Bangkok Condo Predictor</title>
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css'>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .main-card { max-width: 700px; margin: 30px auto; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { background: #007bff; color: white; padding: 30px; border-radius: 15px 15px 0 0; text-align: center; }
        .result-box { background: #d4edda; border-radius: 10px; padding: 20px; display: none; margin-top: 20px; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>
    <div class='container'>
        <div class='card main-card'>
            <div class='header'>
                <h2 class='fw-bold'>🚀 ประเมินราคาคอนโด (Fast Load)</h2>
                <p class='mb-0'>XGBoost Engine Optimized</p>
            </div>
            <div class='card-body p-4'>
                <div id="loading-state" class="text-center py-4">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class='mt-3'>กำลังโหลด AI Engine... กรุณารอสักครู่</p>
                </div>

                <div id="app-content" style="display:none;">
                    <form id="predict-form" class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-bold">ทำเล/เขต</label>
                            <select id="district" class="form-select"></select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">พื้นที่โครงการ (ตร.ม.)</label>
                            <input type="number" id="proj_area" class="form-control" value="4364">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">จำนวนชั้น</label>
                            <input type="number" id="nbr_floors" class="form-control" value="9">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">จำนวนยูนิต</label>
                            <input type="number" id="units" class="form-control" value="248">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">อายุอาคาร (ปี)</label>
                            <input type="number" id="bld_age" class="form-control" value="9">
                        </div>
                        <div class="col-12 mt-4">
                            <button type="button" id="btn-predict" class="btn btn-success w-100 fw-bold">คำนวณราคาปัจจุบัน</button>
                        </div>
                    </form>

                    <div id="result" class="result-box text-center">
                        <h5 class='text-success'>ราคาประมาณการ</h5>
                        <h1 id="price-display" class='fw-bold display-5'>0.00</h1>
                        <p class='mb-0'>บาท / ตารางเมตร</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <py-config>
        packages = ["pandas", "scikit-learn", "xgboost==1.6.1"]
        [[fetch]]
        files = ["xgb_model.pkl", "transformer.pkl", "district_mapping.csv"]
    </py-config>

    <script type="py">
        import pandas as pd
        import pickle
        from pyscript import document
        from pyodide.ffi import create_proxy

        # Pre-load resources
        model = pickle.load(open('xgb_model.pkl', 'rb'))
        pt = pickle.load(open('transformer.pkl', 'rb'))
        dist_data = pd.read_csv('district_mapping.csv')

        def init_ui():
            el_dist = document.getElementById("district")
            for d in sorted(dist_data['district'].unique()):
                opt = document.createElement("option")
                opt.value = d
                opt.text = d
                if d == 'Watthana': opt.selected = True
                el_dist.appendChild(opt)
            
            document.getElementById("loading-state").style.display = "none"
            document.getElementById("app-content").style.display = "block"

        async def handle_predict(evt):
            dist_name = document.getElementById("district").value
            dist_val = float(dist_data[dist_data['district'] == dist_name]['target_encoded_value'].values[0])

            # ใช้ค่าคงที่ที่จำเป็นเพื่อลดขนาด input dataframe
            feature_order = ['proj_area', 'nbr_buildings', 'nbr_floors', 'units', 'hospital', 'bld_age', 
                             'dist_shop_1', 'dist_shop_5', 'dist_food_3', 'dist_food_4', 'dist_food_5', 
                             'dist_school_min', 'dist_tran_min', 'dist_to_siam', 'dist_to_asoke', 
                             'dist_to_silom', 'weighted_amenity_score', 'district_encoded']
            
            vals = [float(document.getElementById("proj_area").value), 1.0, float(document.getElementById("nbr_floors").value), 
                    float(document.getElementById("units").value), 1.2, float(document.getElementById("bld_age").value), 
                    0.7, 1.7, 0.4, 0.48, 0.52, 0.54, 1.2, 7.8, 6.7, 8.4, 0.82, dist_val]

            df_p = pd.DataFrame([vals], columns=feature_order)
            pred = model.predict(df_p)
            final_price = pt.inverse_transform(pred.reshape(-1, 1))[0][0]

            document.getElementById("result").style.display = "block"
            document.getElementById("price-display").innerText = f"{final_price:,.2f}"

        init_ui()
        document.getElementById("btn-predict").addEventListener("click", create_proxy(handle_predict))
    </script>
</body>
</html>
